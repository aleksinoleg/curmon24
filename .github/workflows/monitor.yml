name: rate-monitor

on:
  #schedule:
    # NOTE: cron is in UTC. Kyiv = UTC+3 (summer) / UTC+2 (winter).
    # Interbank session (weekdays, ~09:00–17:00 Kyiv): poll every 15 min
    #- cron: "*/15 6-15 * * 1-5"
    # Evenings/nights: every 2 hours (catches Privat's morning repricing too)
    #- cron: "7 16-23/2 * * *"
    #- cron: "7 0-5/2 * * *"
    # Weekends: every 2 hours
    #- cron: "7 6-15/2 * * 0,6"
  workflow_dispatch: {}   # manual run button

concurrency:
  group: rate-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Poll rates
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD: ${{ vars.ALERT_THRESHOLD || '0.15' }}

      - name: Commit data
        run: |
          git config user.name "rate-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "data: $(TZ=Europe/Kyiv date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
